const FL={cashier_id:'Cashier ID',client_name:'اسم العميل',zone:'المنطقة',offer_amount:'المبلغ',reason:'سبب التمويل',balady_url:'شهادة بلدي',shop_photo:'صورة المحل',location:'الموقع',promissory:'السند الثاني',bank_stmt:'كشف الحساب',bank_stmt_stamped:'كشف حساب سنة',rental:'عقد الإيجار',founding:'عقد التأسيس'};
const MO={'01':'يناير','02':'فبراير','03':'مارس','04':'أبريل','05':'مايو','06':'يونيو','07':'يوليو','08':'أغسطس','09':'سبتمبر','10':'أكتوبر','11':'نوفمبر','12':'ديسمبر'};

let user=null,entries=[],cReqs=[],selReq=null,cType=null,cFD={},cNote='',dF='all',aF='all';
let finLog=[],nhClients=[],shiftRec=null,shiftTmr=null,brkActive=false,brkStart=null;
let anSales=null,anClients=null,anMeta=null,anHist=[];

// ── UTILS ─────────────────────────────────────────
const mLbl=s=>{if(!s)return'';const[y,m]=s.split('-');return(MO[m]||m)+' '+y;};
const fmt=n=>{if(!n&&n!==0)return'—';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toFixed(0);};
const fR=n=>n?n.toLocaleString('ar-SA',{maximumFractionDigits:0})+' ريال':'—';
const tod=()=>new Date().toISOString().split('T')[0];
const pct=(v,t)=>Math.min(100,Math.round((Number(v)||0)/t*100));
const gSt=k=>CSTATS.find(s=>s.key===k)||CSTATS[0];
const gCT=k=>CTYPES.find(t=>t.key===k)||CTYPES.find(t=>t.label===k)||CTYPES[0];
const pL=p=>p>=100?{l:'✅ محقق',c:'#22C55E'}:p>=70?{l:'👀 مراقبة',c:'#D97706'}:{l:'🔴 متأخر',c:'#DC2626'};
const gE=code=>entries.find(e=>e.agent_code===code&&e.entry_date===tod())||null;
const gME=code=>{const d=new Date(),y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0');return entries.filter(e=>e.agent_code===code&&e.entry_date.startsWith(y+'-'+m));};
const sLS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};
const lLS=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}};

// أيام العمل (بدون جمعة وسبت)
function wdPassed(){let c=0;const d=new Date(),y=d.getFullYear(),m=d.getMonth();for(let i=1;i<=d.getDate();i++){const day=new Date(y,m,i).getDay();if(day!==5&&day!==6)c++;}return c;}
function wdTotal(){let c=0;const d=new Date(),y=d.getFullYear(),m=d.getMonth(),tot=new Date(y,m+1,0).getDate();for(let i=1;i<=tot;i++){const day=new Date(y,m,i).getDay();if(day!==5&&day!==6)c++;}return c;}

function getTF(code){return(FIN_INIT[code]||0)+finLog.filter(f=>f.agent_code===code).reduce((s,f)=>s+(Number(f.amount)||0),0);}

function bH(sk,lg){const s=gSt(sk);return'<span class="sbadge'+(lg?' lg':'')+'" style="background:'+s.bg+';color:'+s.color+';border:1px solid '+s.color+'44;">'+s.icon+' '+s.label+'</span>';}
function tbH(title,icon,back,home){return'<div class="topbar"><div style="display:flex;align-items:center;gap:10px;"><svg width="30" height="30" viewBox="0 0 60 60" fill="none"><rect width="60" height="60" rx="14" fill="rgba(255,255,255,0.15)"/><path d="M14 44V16h8v11h16V16h8v28h-8V35H22v9H14z" fill="#C4B5FD"/><circle cx="46" cy="16" r="5" fill="#22C55E"/></svg><div style="width:1px;height:18px;background:rgba(255,255,255,0.3)"></div><span style="color:#fff;font-size:13px;font-weight:700;">'+(icon||'')+' '+(title||'')+'</span></div><div style="display:flex;gap:8px;">'+(user?'<span style="background:rgba(255,255,255,0.12);border-radius:20px;padding:3px 12px;font-size:11px;color:rgba(255,255,255,0.9);">'+user.name+'</span>':'')+(back?'<button class="btn-top" onclick="'+back+'">← رجوع</button>':'')+(home?'<button class="btn-top" onclick="showPage(\'home\')">🏠</button>':'')+'</div></div>';}
function nlH(dest){return'<div style="min-height:100vh;background:#FAFAFA;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;"><div><div style="font-size:52px;margin-bottom:16px;">🔐</div><div style="font-size:16px;font-weight:700;margin-bottom:16px;">يجب تسجيل الدخول أولاً</div><button class="btn-purple" style="width:auto;padding:12px 28px;" onclick="document.getElementById(\'login\').dataset.dest=\''+dest+'\';showPage(\'login\')">تسجيل الدخول</button></div></div>';}

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));const p=document.getElementById(id);if(p)p.classList.add('active');window.scrollTo(0,0);}
function authGo(dest){
  if(!user){document.getElementById('login').dataset.dest=dest;showPage('login');return;}
  showPage(dest);
  if(dest==='tracker')renderTracker();
  else if(dest==='credit')renderCredit();
  else if(dest==='shift')renderShift();else if(dest==='techissue')renderTechIssue();

function updHome(){

let needPin=false;
function lErr(m){const e=document.getElementById('lerr');e.textContent=m;e.style.display=m?'block':'none';}
function lRP(){needPin=false;const pw=document.getElementById('pinw');if(pw)pw.style.display='none';const lb=document.getElementById('lbtn');if(lb)lb.textContent='متابعة';}
function setCode(k){const lc=document.getElementById('lcode');if(lc)lc.value=k;lErr('');lRP();}
function buildChips(){
  const mc=document.getElementById('mchips'),sc=document.getElementById('schips');
  if(mc)mc.innerHTML=Object.keys(ALL_M).map(k=>'<span onclick="setCode(\''+k+'\')" style="font-size:9px;padding:3px 8px;border-radius:20px;cursor:pointer;border:1px solid #DDD6FE;color:#6B21A8;background:#F5F3FF;font-family:monospace;display:inline-block;margin:2px;">'+k+'</span>').join('');
  if(sc)sc.innerHTML=[RGN].map(k=>'<span onclick="setCode(\''+k+'\')" style="font-size:9px;padding:3px 8px;border-radius:20px;cursor:pointer;border:1px solid rgba(217,119,6,0.3);color:#D97706;background:#FEF3C7;font-family:monospace;display:inline-block;">'+k+'</span>').join('');
}
function doLogin(){
  const code=(document.getElementById('lcode').value||'').trim().toUpperCase();lErr('');
  if(code===_OWN){
    if(!needPin){needPin=true;document.getElementById('pinw').style.display='block';document.getElementById('lbtn').textContent='دخول المالك ←';document.getElementById('lpin').focus();return;}
    if((document.getElementById('lpin').value||'')!==_OWN){lErr('رمز المالك غير صحيح');return;}
    user={code:'OWNER',name:'المالك',role:'owner',color:'#1D4ED8'};
    sLS('hu5',user);document.getElementById('lcode').value='';document.getElementById('lpin').value='';needPin=false;
    updHome();showPage('home');return;
  }
  const isSup=SUPS.includes(code)||Object.values(TEAMS).some(t=>t.sup.code===code);
  if(isSup){
    if(!needPin){needPin=true;document.getElementById('pinw').style.display='block';document.getElementById('lbtn').textContent='دخول ←';document.getElementById('lpin').focus();return;}
    if((document.getElementById('lpin').value||'')!==SPIN){lErr('رمز الدخول غير صحيح');return;}
    const isR=code===RGN,tk=Object.keys(TEAMS).find(k=>TEAMS[k].sup.code===code),si=ALL_S[code]||{name:'Osman Baboor',color:'#6B21A8'};
    user={code,name:si.name,role:isR?'region':'supervisor',teamKey:tk,color:si.color};
    sLS('hu5',user);document.getElementById('lcode').value='';document.getElementById('lpin').value='';needPin=false;
    updHome();const dest=document.getElementById('login').dataset.dest||'home';
    showPage(dest);if(dest==='tracker')renderTracker();else if(dest==='credit')renderCredit();else if(dest==='shift')renderShift();else if(dest==='techissue')renderTechIssue();return;
  }
  if(ALL_M[code]){
    if(!needPin){needPin=true;document.getElementById('pinw').style.display='block';document.getElementById('lbtn').textContent='دخول ←';document.getElementById('lpin').focus();return;}
    if((document.getElementById('lpin').value||'')!==EMP_PINS[code]){lErr('كلمة المرور غير صحيحة');return;}
    user={code,name:ALL_M[code].name,role:'employee',color:ALL_M[code].color};
    sLS('hu5',user);document.getElementById('lcode').value='';document.getElementById('lpin').value='';needPin=false;
    updHome();const dest=document.getElementById('login').dataset.dest||'home';
    showPage(dest);if(dest==='tracker')renderTracker();else if(dest==='credit')renderCredit();else if(dest==='shift')renderShift();else if(dest==='techissue')renderTechIssue();return;
  }
  lErr('الكود غير صحيح');
}
function doLogout(){user=null;sLS('hu5',null);updHome();showPage('home');}

async function loadEntries(){try{const d=await dbGet('daily_entries','?order=entry_date.desc');entries=Array.isArray(d)?d:[];}catch(e){}}
async function loadFinLog(){try{const d=await dbGet('financing_log','?order=created_at.desc');finLog=Array.isArray(d)?d:[];}catch(e){}}
async function loadNH(){try{const d=await dbGet('nonhala_clients','?order=created_at.desc');nhClients=Array.isArray(d)?d:[];}catch(e){}}

function renderTracker(){
  if(!user){document.getElementById('tracker').innerHTML=nlH('tracker');return;}
  Promise.all([loadEntries(),loadFinLog()]).then(()=>renderTDash());
}

function finBanner(code){
  const total=getTF(code),p=Math.round(total/EMP_TGT*100),r100=Math.max(0,EMP_TGT-total),r150=Math.max(0,EMP_TGT*1.5-total);
  return'<div class="card" style="background:linear-gradient(135deg,#6B21A8,#7C3AED);padding:18px;">'+
  '<div style="font-size:11px;color:rgba(255,255,255,0.7);margin-bottom:4px;">💰 تحقيق التمويل الشهري</div>'+
  '<div style="font-size:30px;font-weight:900;color:#fff;margin-bottom:4px;">'+total.toLocaleString('ar-SA')+' <span style="font-size:13px;">ريال</span></div>'+
  '<div style="font-size:12px;color:rgba(255,255,255,0.7);margin-bottom:10px;">'+p+'% من '+EMP_TGT.toLocaleString('ar-SA')+'</div>'+
  '<div style="background:rgba(255,255,255,0.2);border-radius:8px;height:12px;overflow:hidden;margin-bottom:10px;"><div style="height:100%;background:'+(p>=100?'#22C55E':'#86EFAC')+';border-radius:8px;width:'+Math.min(p,100)+'%;"></div></div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+
  '<div style="background:rgba(255,255,255,0.12);border-radius:10px;padding:10px;text-align:center;"><div style="font-size:10px;color:rgba(255,255,255,0.6);">باقي لـ 100%</div><div style="font-size:15px;font-weight:700;color:'+(r100===0?'#22C55E':'#FCD34D')+';">'+(r100===0?'✅ محقق':r100.toLocaleString('ar-SA'))+'</div></div>'+
  '<div style="background:rgba(255,255,255,0.12);border-radius:10px;padding:10px;text-align:center;"><div style="font-size:10px;color:rgba(255,255,255,0.6);">باقي لـ 150%</div><div style="font-size:15px;font-weight:700;color:'+(r150===0?'#22C55E':'#FCD34D')+';">'+(r150===0?'✅ محقق':r150.toLocaleString('ar-SA'))+'</div></div>'+
  '</div></div>';
}

function renderTDash(){
  const isSup=user.role==='supervisor'||user.role==='region'||user.role==='owner';
  const tks=user.role==='region'?Object.keys(TEAMS):user.teamKey?[user.teamKey]:[];
  const showM=user.role==='employee'?[user.code]:tks.flatMap(tk=>Object.keys(TEAMS[tk].members));
  const d=wdPassed(),wd=wdTotal();
  let h=tbH('متابعة الأداء','📊',null,'showPage(\'home\')');
  h+='<div class="content">';

  if(user.role==='employee'){
    h+='<div class="alert-box" style="background:#FEF3C7;border:1px solid #FCD34D;color:#92400E;">⚠️ تحرى الدقة في التسجيل اليومي حتى تنعكس النتيجة بشكل صحيح على أداء المنطقة</div>';
    h+=finBanner(user.code);
    h+='<button class="btn-purple" onclick="renderTInput()">✏️ تسجيل أداء اليوم</button>';
    h+='<button class="btn-green" onclick="renderFinInput()">💰 تسجيل تمويل مُقفل</button>';
    h+='<button class="btn-outline" onclick="renderNHInput()">🔗 تسجيل عميل Non-Hala</button>';
    h+='<div class="card" style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:12px;font-weight:700;">📅 أيام العمل هذا الشهر</div><div style="font-size:11px;color:#9CA3AF;">(باستثناء الجمعة والسبت)</div></div><div style="font-size:28px;font-weight:900;color:#6B21A8;">'+d+'<span style="font-size:14px;color:#9CA3AF;">/'+wd+'</span></div></div>';
    const e=gE(user.code);
    if(e){h+='<div class="card"><div style="font-size:12px;font-weight:700;color:#9CA3AF;margin-bottom:12px;">📅 أداؤك اليوم</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'+PF.map(f=>{const v=e[f.key]||0,p=pct(v,f.target);return'<div class="card-sm" style="text-align:center;"><div>'+f.icon+'</div><div style="font-size:20px;font-weight:900;color:'+(p>=100?'#166534':'#6B21A8')+'">'+v+'</div><div style="font-size:9px;color:#9CA3AF;">/'+f.target+' '+f.unit+'</div></div>';}).join('')+'</div></div>';}
  } else if(user.role==='region'){
    h+=renderRegion(d,wd);
  } else {
    h+=renderSupSection(showM,d,wd);
  }
  h+='</div>';
  document.getElementById('tracker').innerHTML=h;
}

function renderSupSection(showM,d,wd){
  let sub=0,tot=0;
  showM.forEach(c=>{const e=gE(c);if(e){sub++;tot+=PF.reduce((a,f)=>a+pct(e[f.key],f.target),0)/PF.length;}});
  const tAvg=sub?Math.round(tot/sub):0;
  const tfT=showM.reduce((s,c)=>s+getTF(c),0),tpct=Math.round(tfT/(showM.length*EMP_TGT)*100);

  let h='<div class="card" style="background:rgba(107,33,168,0.08);border:1px solid #DDD6FE;">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div style="font-size:11px;color:#6B21A8;font-weight:700;">أداء الفريق اليوم</div><div style="font-size:38px;font-weight:900;color:'+(tAvg>=80?'#166534':'#D97706')+'">'+tAvg+'%</div></div>';
  h+='<div style="display:flex;gap:10px;margin-bottom:12px;">';
  h+='<div class="card-sm" style="flex:1;text-align:center;"><div style="font-size:20px;font-weight:900;color:#6B21A8;">'+sub+'</div><div style="font-size:9px;color:#9CA3AF;">أدخلوا</div></div>';
  h+='<div class="card-sm" style="flex:1;text-align:center;"><div style="font-size:20px;font-weight:900;color:#DC2626;">'+(showM.length-sub)+'</div><div style="font-size:9px;color:#9CA3AF;">لم يُدخلوا</div></div>';
  h+='<div class="card-sm" style="flex:1;text-align:center;"><div style="font-size:20px;font-weight:900;color:#D97706;">'+d+'</div><div style="font-size:9px;color:#9CA3AF;">يوم عمل مضى</div></div>';
  h+='</div>';
  h+='<div style="font-size:11px;color:#6B21A8;font-weight:700;margin-bottom:6px;">💰 تمويل الفريق — '+tpct+'%</div>';
  h+='<div class="tbar-bg"><div class="tbar-fill" style="width:'+Math.min(tpct,100)+'%;background:'+(tpct>=100?'#22C55E':'#6B21A8')+'"></div></div>';
  h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:#9CA3AF;margin-top:4px;"><span>'+tfT.toLocaleString('ar-SA')+' ريال</span><span>هدف: '+(showM.length*EMP_TGT).toLocaleString('ar-SA')+'</span></div>';
  h+='</div>';

  // فلتر اليوم
  h+='<div class="card"><div style="font-size:12px;font-weight:700;margin-bottom:10px;">📆 بحث بالتاريخ</div><input type="date" id="dfilter" value="'+tod()+'" style="width:100%;background:#FAFAFA;border:1.5px solid #DDD6FE;border-radius:10px;padding:10px;font-size:13px;" onchange="showDayFilter(this.value)"></div>';

  h+='<div style="display:flex;justify-content:flex-end;"><button class="btn-outline" style="width:auto;padding:6px 14px;" onclick="Promise.all([loadEntries(),loadFinLog()]).then(renderTDash)">🔄 تحديث</button></div>';
  showM.forEach(code=>{h+=mCardH(code,d,wd);});
  return h;
}

function showDayFilter(date){
  const showM=user.teamKey?Object.keys(TEAMS[user.teamKey].members):Object.values(TEAMS).flatMap(t=>Object.keys(t.members));
  const prev=document.getElementById('dayres');if(prev)prev.remove();
  let h='<div id="dayres" class="card"><div style="font-size:12px;font-weight:700;margin-bottom:12px;">📅 '+date+'</div>';
  showM.forEach(code=>{
    const m=ALL_M[code]||{name:code,color:'#6B21A8'};
    const e=entries.find(en=>en.agent_code===code&&en.entry_date===date)||null;
    h+='<div style="border-bottom:1px solid #E5E7EB;padding:10px 0;"><div style="font-size:13px;font-weight:700;margin-bottom:6px;">'+(m.short||m.name)+'</div>';
    if(e)h+='<div style="display:flex;gap:8px;">'+PF.map(f=>{const v=e[f.key]||0,p=pct(v,f.target);return'<div style="flex:1;text-align:center;background:#FAFAFA;border-radius:8px;padding:6px;"><div style="font-size:10px;">'+f.icon+'</div><div style="font-size:13px;font-weight:700;color:'+(p>=100?'#166534':'#1A1A2E')+'">'+v+'</div></div>';}).join('')+'</div>';
    else h+='<div style="font-size:11px;color:#9CA3AF;">لا يوجد إدخال</div>';
    h+='</div>';
  });
  h+='</div>';
  const cont=document.querySelector('#tracker .content');
  if(cont){const df=document.getElementById('dayres');if(df)df.remove();const div=document.createElement('div');div.innerHTML=h;cont.appendChild(div.firstChild);}
}

function mCardH(code,d,wd){
  const m=ALL_M[code]||{name:code,color:'#6B21A8'};
  const e=gE(code),p=e?PF.reduce((a,f)=>a+pct(e[f.key],f.target),0)/PF.length:0;
  const st=pL(p),tf=getTF(code),fp=Math.round(tf/EMP_TGT*100);
  const bc=fp>=100?'#22C55E':fp>=70?'#D97706':'#DC2626',bg=fp>=100?'#F0FDF4':fp>=70?'#FEF3C7':'#FEF2F2';
  let h='<button class="mcard" style="border-right-color:'+m.color+';opacity:'+(e?1:0.7)+';border-top:2px solid '+bc+';background:'+bg+';" onclick="renderTDetail(\''+code+'\')">';

function saveChunked(key,obj){const s=JSON.stringify(obj),sz=3.8*1024*1024,n=Math.ceil(s.length/sz);for(let i=0;i<30;i++)localStorage.removeItem(key+'_'+i);for(let i=0;i<n;i++)localStorage.setItem(key+'_'+i,s.slice(i*sz,(i+1)*sz));localStorage.setItem(key+'_n',String(n));}
function loadChunked(key){const n=parseInt(localStorage.getItem(key+'_n')||'0');if(!n)return null;let s='';for(let i=0;i<n;i++){const c=localStorage.getItem(key+'_'+i);if(!c)return null;s+=c;}try{return JSON.parse(s);}catch(e){return null;}}

// ── ANALYZER ─────────────────────────────
const AN_BASE=(()=>{const p=window.location.pathname;const base=p.substring(0,p.lastIndexOf('/')+1);return window.location.origin+base;})();
let salesIndexLoaded=false;const salesChunkLoaded={};

async function loadSalesIndex(){
  if(salesIndexLoaded)return true;
  return new Promise(r=>{const s=document.createElement('script');s.src=AN_BASE+'sales_index.js';s.onload=()=>{salesIndexLoaded=true;r(true);};s.onerror=()=>r(false);document.head.appendChild(s);});
}
async function loadSalesChunk(n){
  if(salesChunkLoaded[n])return true;
  return new Promise(r=>{const s=document.createElement('script');s.src=AN_BASE+'sales_'+n+'.js';s.onload=()=>{salesChunkLoaded[n]=true;r(true);};s.onerror=()=>r(false);document.head.appendChild(s);});
}
async function findEntity(eid){
  const ok=await loadSalesIndex();if(!ok||!window.SALES_INDEX)return null;
  const cn=window.SALES_INDEX[eid];if(cn===undefined)return null;
  const ck=await loadSalesChunk(cn);if(!ck)return null;
  const cd=window['SALES_CHUNK_'+cn];return cd?cd[eid]:null;

async function doAnSrch(){
  const eid=document.getElementById('anq')?.value?.trim();
  const st=document.getElementById('anst');const res=document.getElementById('anres');
  if(!eid)return;
  if(st){st.style.color='#6B21A8';st.textContent='⏳ جاري البحث...';}
  try{
    const s=await findEntity(eid);
    if(!s){if(st){st.style.color='#DC2626';st.textContent='⚠️ رقم العميل غير موجود';}return;}
    if(st)st.textContent='';
    const months=Object.entries(s).map(([m,v])=>({month:m,sales:v})).sort((a,b)=>a.month.localeCompare(b.month));
    const fin=calcFin(months);
    const hst=[{eid},...anHist.filter(x=>x.eid!==eid)].slice(0,10);
    anHist=hst;sLS('hh4',hst);
    if(res)res.innerHTML=anResH(eid,months,{},fin);
  }catch(e){if(st){st.style.color='#DC2626';st.textContent='خطأ في البحث';}}
}

function calcFin(months){
  if(!months?.length)return null;
  const vals=months.map(m=>m.sales).filter(v=>v>0);if(!vals.length)return null;
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const last6=months.slice(-6).map(m=>m.sales).filter(v=>v>0);
  const avg6=last6.length?last6.reduce((a,b)=>a+b,0)/last6.length:avg;
  const mx=Math.max(...vals),mn=Math.min(...vals),vol=mx>0?((mx-mn)/mx)*100:0;
  const rate=vol<50?0.10:0.05,est=Math.min(Math.max(avg6*12*rate,1000),2000000);
  return{avg,avg6,vol,annualSales:avg6*12,rate:rate*100,estimate:Math.round(est/1000)*1000,
    grade:vol<50?'منخفض':vol<70?'متوسط':'عالي',gradeIcon:vol<50?'🟢':vol<70?'🟡':'⚠️',
    gradeColor:vol<50?'#166534':vol<70?'#D97706':'#DC2626',
    rec:vol<50?'دخل منتظم — مؤهل جيد للتمويل':vol<70?'تذبذب موسمي — يمكن التمويل بتحفظ':'دخل غير منتظم — يتطلب مراجعة'};
}

function anResH(eid,months,info,fin){
  const avg=fin?.avg||0,mxS=Math.max(...months.map(m=>m.sales)),mnS=Math.min(...months.map(m=>m.sales));
  const maxM=months.reduce((a,b)=>a.sales>b.sales?a:b,months[0]),minM=months.filter(m=>m.sales>0).reduce((a,b)=>a.sales<b.sales?a:b,months[0]);
  const cW=570,cH=180,pL=48,pR=20,pT=28,pB=28,iW=cW-pL-pR,iH=cH-pT-pB;
  const xSt=months.length>1?iW/(months.length-1):0,yRng=mxS-mnS||1;
  const xp=i=>pL+i*xSt,yp=v=>pT+iH-(((v-mnS)/yRng)*iH);
  const avgY=yp(avg),pts=months.map((m,i)=>({x:xp(i),y:yp(m.sales),v:m.sales,month:m.month}));
  const poly=pts.map(p=>p.x+','+p.y).join(' ');
  let h='<div class="card" style="padding:0;overflow:hidden;"><div style="background:linear-gradient(135deg,#6B21A8,#166534);padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;"><div><div style="font-size:20px;font-weight:800;color:#fff;">'+(info.name||'Entity '+eid)+'</div><div style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:4px;">ID: '+eid+'</div></div><div style="text-align:right;"><div style="font-size:22px;font-weight:900;color:#fff;">'+fmt(fin?.avg6)+'</div><div style="font-size:10px;color:rgba(255,255,255,0.7);">متوسط آخر 6 أشهر</div></div></div>';
  if(info.name||info.cashier)h+='<div style="padding:14px 20px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;">'+[{l:'المحاسب',v:info.cashier||'—'},{l:'المدير',v:info.manager||'—'},{l:'المنطقة',v:info.zone||'—'},{l:'السجل',v:info.code||'—'}].map(x=>'<div style="background:#FAFAFA;border-radius:10px;padding:10px 12px;"><div style="font-size:9px;color:#9CA3AF;margin-bottom:3px;">'+x.l+'</div><div style="font-size:12px;font-weight:600;word-break:break-all;">'+x.v+'</div></div>').join('')+'</div>';
  h+='</div>';
  h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><div style="font-size:13px;font-weight:700;">📈 ترند المبيعات الشهرية</div><div style="font-size:11px;color:#9CA3AF;">'+mLbl(months[0]?.month)+' ← '+mLbl(months[months.length-1]?.month)+'</div></div>';
  h+='<div style="overflow-x:auto;"><svg width="'+cW+'" height="'+cH+'" viewBox="0 0 '+cW+' '+cH+'" style="min-width:'+cW+'px;display:block;"><defs><linearGradient id="glg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22C55E" stop-opacity="0.25"/><stop offset="100%" stop-color="#22C55E" stop-opacity="0.02"/></linearGradient></defs>';
  [0,0.25,0.5,0.75,1].forEach(t=>{const y=pT+iH*t,v=mxS-(t*(mxS-mnS));h+='<line x1="'+pL+'" y1="'+y+'" x2="'+(cW-pR)+'" y2="'+y+'" stroke="#E5E7EB" stroke-width="1"/><text x="'+(pL-4)+'" y="'+(y+4)+'" text-anchor="end" font-size="9" fill="#9CA3AF">'+fmt(v)+'</text>';});
  h+='<line x1="'+pL+'" y1="'+avgY+'" x2="'+(cW-pR)+'" y2="'+avgY+'" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,4"/><text x="'+(cW-pR+2)+'" y="'+(avgY+4)+'" font-size="9" fill="#D97706">متوسط</text>';
  h+='<path d="M'+pts[0].x+','+(pT+iH)+' '+pts.map(p=>'L'+p.x+','+p.y).join(' ')+' L'+pts[pts.length-1].x+','+(pT+iH)+' Z" fill="url(#glg)"/>';
  h+='<polyline points="'+poly+'" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  pts.forEach(p=>{const isH=p.v>avg*1.2,isL=p.v<avg*0.8,c=isH?'#166534':isL?'#DC2626':'#22C55E';const lx=Math.min(Math.max(p.x,pL+15),cW-pR-15),ly=p.y>pT+20?p.y-10:p.y+18;h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+c+'" stroke="white" stroke-width="2"/><text x="'+lx+'" y="'+ly+'" text-anchor="middle" font-size="9" font-weight="700" fill="'+c+'">'+fmt(p.v)+'</text><text x="'+p.x+'" y="'+(cH-4)+'" text-anchor="middle" font-size="8" fill="#9CA3AF">'+p.month.slice(2)+'</text>';});
  h+='</svg></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px;">'+[{l:'أعلى شهر',v:fmt(maxM?.sales),s:mLbl(maxM?.month),c:'#166534'},{l:'أدنى شهر',v:fmt(minM?.sales),s:mLbl(minM?.month),c:'#DC2626'},{l:'المتوسط',v:fmt(avg),s:'كل الفترة',c:'#1A1A2E'},{l:'الإجمالي',v:fmt(months.reduce((a,b)=>a+b.sales,0)),s:'ريال',c:'#15803D'}].map(x=>'<div style="background:#FAFAFA;border-radius:10px;padding:10px 8px;text-align:center;"><div style="font-size:9px;color:#9CA3AF;margin-bottom:3px;">'+x.l+'</div><div style="font-size:15px;font-weight:800;color:'+x.c+';">'+x.v+'</div><div style="font-size:9px;color:#9CA3AF;margin-top:2px;">'+x.s+'</div></div>').join('')+'</div></div>';
  h+='<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:14px;">📊 تحليل الفولاتية</div><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;"><div style="flex:1;background:#E5E7EB;border-radius:20px;height:12px;overflow:hidden;"><div style="height:100%;width:'+Math.min(fin?.vol||0,100)+'%;background:'+fin?.gradeColor+';border-radius:20px;"></div></div><div style="font-size:24px;font-weight:900;color:'+fin?.gradeColor+'">'+fin?.vol?.toFixed(1)+'%</div><div style="font-size:14px;font-weight:700;color:'+fin?.gradeColor+'">'+fin?.gradeIcon+' '+fin?.grade+'</div></div><div style="background:#FAFAFA;border-radius:10px;padding:12px 14px;font-size:13px;color:#4B5563;line-height:1.7;">'+fin?.rec+'</div></div>';
  h+='<div style="background:linear-gradient(135deg,#6B21A8,#166534);border-radius:16px;padding:20px;"><div style="font-size:13px;font-weight:700;color:rgba(255,255,255,0.8);margin-bottom:4px;">💰 التقدير التمويلي</div><div style="font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:14px;">تقدير مبدئي — غير ملزم</div><div style="text-align:center;margin-bottom:14px;"><div style="font-size:40px;font-weight:900;color:#fff;">'+fR(fin?.estimate)+'</div></div><div style="background:rgba(255,255,255,0.12);border-radius:10px;padding:12px 16px;font-size:12px;color:rgba(255,255,255,0.85);line-height:2;"><div>المبيعات السنوية: <strong style="color:#fff;">'+fR(fin?.annualSales)+'</strong></div><div>نسبة التمويل: <strong style="color:#fff;">'+fin?.rate+'%</strong></div><div>الفولاتية: <strong style="color:#fff;">'+fin?.gradeIcon+' '+fin?.grade+' — '+fin?.vol?.toFixed(1)+'%</strong></div></div></div>';
  h+='<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:14px;">📋 تفاصيل شهرية</div><table style="width:100%;border-collapse:collapse;font-size:12px;"><thead><tr style="background:#F5F3FF;"><th style="padding:8px 12px;text-align:right;color:#6B21A8;font-weight:700;border-bottom:1px solid #DDD6FE;">الشهر</th><th style="padding:8px 12px;text-align:left;color:#6B21A8;font-weight:700;border-bottom:1px solid #DDD6FE;font-family:monospace;">المبيعات</th><th style="padding:8px 12px;text-align:center;color:#6B21A8;font-weight:700;border-bottom:1px solid #DDD6FE;">vs المتوسط</th></tr></thead><tbody>'+[...months].reverse().map((m,i)=>{const diff=avg>0?((m.sales-avg)/avg)*100:0,hi=diff>20,lo=diff<-20;return'<tr style="background:'+(i%2===0?'#fff':'#FAFAFA')+'"><td style="padding:8px 12px;color:#4B5563;border-bottom:1px solid #E5E7EB;">'+mLbl(m.month)+'</td><td style="padding:8px 12px;text-align:left;font-weight:600;color:'+(hi?'#166534':lo?'#DC2626':'#1A1A2E')+';font-family:monospace;border-bottom:1px solid #E5E7EB;">'+m.sales.toLocaleString('ar-SA',{maximumFractionDigits:0})+'</td><td style="padding:8px 12px;text-align:center;border-bottom:1px solid #E5E7EB;"><span style="font-size:11px;color:'+(hi?'#166534':lo?'#DC2626':'#9CA3AF')+';background:'+(hi?'#F0FDF4':lo?'#FEF2F2':'#FAFAFA')+';padding:2px 8px;border-radius:20px;">'+(diff>=0?'+':'')+diff.toFixed(0)+'%</span></td></tr>';}).join('')+'</tbody></table></div>';
  return h;
}
